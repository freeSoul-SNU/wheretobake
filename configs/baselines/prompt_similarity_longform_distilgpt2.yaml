defaults:
  - ../base_smoke.yaml
  - ../dataset/longform_prompt_bake.yaml
  - ../models/distilgpt2.yaml

run:
  run_name: prompt_similarity_longform_distilgpt2
  mode: localization_only
  device: cpu
  dtype: float32

baseline:
  name: promptbake_kl
  family_scope: all
  extension: false

localization:
  enabled: true
  alpha: 0.5
  compute_causal: true
  representation_pooling: response_last_k_concat
  response_last_k: 4
  causal_metric: response_region_kl
  splits:
    - train
    - valid
    - test
  paraphrase_split: all
  candidate_module_suffixes:
    - c_attn
    - c_proj
    - c_fc
  max_records: 18
  output_prefix: outputs/localization/prompt_similarity_longform_distilgpt2

output:
  output_dir: outputs/prompt_similarity_longform_distilgpt2
  save_resolved_config: true
  save_predictions: false
