defaults:
  - ../base_smoke.yaml
  - ../base_gpu.yaml
  - ../dataset/longform_prompt_bake.yaml
  - ../models/tiny_gpt2.yaml

run:
  run_name: promptbake_kl_longform_gpu

baseline:
  name: promptbake_kl
  family_scope: all
  extension: false

train:
  num_epochs: 3
  max_steps: 120
  learning_rate: 1.0e-4
  train_paraphrase_split: seen

output:
  output_dir: outputs/promptbake_kl_longform_gpu
  save_resolved_config: true
  save_predictions: true

