defaults:
  - ../base_smoke.yaml
  - ../models/tiny_gpt2.yaml
  - ../dataset/synthetic_prompt_bake.yaml

run:
  run_name: promptbake_kl_smoke

baseline:
  name: promptbake_kl
  family_scope: concise
  extension: false

loss:
  kl_weight: 1.0
  delta_weight: 0.0
  preserve_weight: 0.0
  temperature: 1.0
  reduction: mean

output:
  output_dir: outputs/promptbake_kl_smoke
  save_resolved_config: true
  save_predictions: true

