defaults:
  - ../base_smoke.yaml
  - ../models/tiny_gpt2.yaml
  - ../dataset/synthetic_prompt_bake.yaml

run:
  run_name: magnitude_topk_smoke

baseline:
  name: magnitude_topk
  family_scope: all
  extension: false

selection:
  candidate_module_suffixes:
    - c_attn
    - c_proj
    - c_fc
  budget: 2
  probe_examples: 6

output:
  output_dir: outputs/magnitude_topk_smoke
  save_resolved_config: true
  save_predictions: true
