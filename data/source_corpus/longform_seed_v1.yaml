examples:
  - source_id: civic_budget_train_001
    split: train
    title: City Library Renovation Brief
    source_text: >
      The city library will begin a phased renovation in September after years of deferred maintenance.
      The first phase replaces the leaking roof, modernizes the heating system, and upgrades lighting in
      the reading rooms. A second phase scheduled for winter will improve accessibility by widening aisles,
      adding an elevator to the west wing, and reconfiguring service desks so visitors using wheelchairs can
      receive assistance more easily. During construction, the children's room will move to a temporary
      community center space two blocks away, while the digital media lab will remain open with reduced hours.
      Project leaders estimate that total costs will remain within the approved budget because donated furniture
      and volunteer labor will reduce finishing expenses.
    family_targets:
      concise: The library renovation starts in September and upgrades maintenance, accessibility, and service areas while staying within budget.
      formal: The municipal library renovation will commence in September, delivering maintenance and accessibility improvements while remaining within the approved budget.
      step_by_step: 1. Renovation begins in September. 2. Phase one repairs the roof, heating, and lighting. 3. Phase two improves accessibility and service desks. 4. Temporary relocations keep most services available within budget.
  - source_id: climate_train_002
    split: train
    title: Wetland Flood Control Report
    source_text: >
      Regional planners reviewed flooding outcomes after restoring a network of wetlands along the lower river.
      Engineers found that the restored marshes slowed runoff during two heavy storms, reducing peak water levels
      in nearby neighborhoods by several centimeters. Farmers downstream initially worried that standing water would
      remain on their land longer, but monitoring showed that drainage returned to normal within three days.
      The report also notes that bird populations increased during the first spring after restoration and that
      maintenance costs were lower than expected because native vegetation outcompeted most invasive species.
      Officials now recommend expanding the project to two additional tributaries before the next rainy season.
    family_targets:
      concise: Restored wetlands reduced flood peaks, recovered quickly after storms, and are now recommended for expansion.
      formal: The wetland restoration project measurably reduced flood severity, normalized drainage promptly, and has been recommended for expansion to additional tributaries.
      step_by_step: 1. Planners evaluated the restored wetlands after storms. 2. The marshes reduced peak flood levels. 3. Drainage returned to normal within three days. 4. Officials now recommend extending the project.
  - source_id: health_train_003
    split: train
    title: Hospital Discharge Pilot
    source_text: >
      A regional hospital tested a discharge pilot for older patients with chronic conditions.
      Under the pilot, each patient received a medication review, a printed recovery checklist,
      and a follow-up phone call within forty-eight hours of leaving the hospital. Nurses reported
      that the calls often identified confusion about dosage timing or missed appointments before those
      issues became serious. Over the three-month trial, readmissions fell modestly, but staff emphasized
      that the strongest benefit was improved confidence among patients and family caregivers. Administrators
      are now deciding whether to extend the program permanently and whether translators should be added for
      patients who prefer languages other than Korean or English.
    family_targets:
      concise: The discharge pilot improved follow-up support and slightly reduced readmissions for older patients.
      formal: The hospital discharge pilot enhanced post-discharge support and produced a modest reduction in readmissions among older patients with chronic conditions.
      step_by_step: 1. Patients received medication reviews and recovery checklists. 2. Nurses called within forty-eight hours. 3. The calls caught medication and appointment problems early. 4. The hospital is considering permanent expansion with language support.
  - source_id: education_train_004
    split: train
    title: School Tutoring Evaluation
    source_text: >
      A district tutoring program paired middle-school students with university mentors for twelve weeks.
      Sessions focused on reading comprehension, note-taking, and planning longer assignments rather than drilling
      standardized test questions. Teachers observed that students who attended regularly were more willing to ask
      questions in class and submitted fewer incomplete essays by the end of the term. Attendance was strongest when
      tutoring took place immediately after school and when guardians received weekly progress messages. The evaluation
      warns, however, that gains may fade if the district cannot keep mentor turnover low or if transportation remains
      unreliable for students who live farther from campus.
    family_targets:
      concise: The tutoring program improved engagement and assignment completion, especially when attendance support was strong.
      formal: The district tutoring initiative improved classroom engagement and assignment completion, particularly when scheduling and family communication supported consistent attendance.
      step_by_step: 1. Students met university mentors for twelve weeks. 2. Sessions emphasized comprehension and planning skills. 3. Teachers saw better participation and fewer incomplete essays. 4. Long-term gains depend on stable mentors and transportation.
  - source_id: energy_train_005
    split: train
    title: Apartment Solar Trial
    source_text: >
      A housing cooperative installed rooftop solar panels on three apartment buildings and tracked electricity use
      for six months. Residents saw lower common-area energy bills, but savings varied because one building still had
      outdated refrigeration units in a shared storage room. The trial also revealed that regular cleaning mattered:
      panels exposed to dust from a nearby construction site produced less power until the cooperative added monthly
      inspections. Despite those differences, the board concluded that payback would likely arrive sooner than expected
      if maintenance schedules remained consistent and if a planned battery purchase reduced evening demand charges.
    family_targets:
      concise: The solar trial lowered shared energy costs, and better maintenance could improve savings further.
      formal: The cooperative's solar trial reduced common-area electricity costs, with additional savings expected from consistent maintenance and battery support.
      step_by_step: 1. The cooperative installed rooftop solar panels. 2. Common-area energy bills decreased. 3. Outdated equipment and dust reduced some gains. 4. The board expects faster payback with maintenance and batteries.
  - source_id: transport_valid_001
    split: valid
    title: Bus Lane Enforcement Memo
    source_text: >
      Transit officials introduced camera enforcement on two downtown bus lanes after repeated complaints about delays.
      During the first month, buses on the monitored corridors arrived closer to schedule and drivers filed fewer reports
      of blocked stops. Merchants initially feared that enforcement would reduce customer access, yet pedestrian counts
      and short-term parking use remained stable according to the city's review. The memo recommends adding clearer curb
      markings before expanding the program because several drivers claimed they could not distinguish loading areas from
      the bus-only lane during evening hours.
    family_targets:
      concise: Camera enforcement improved bus reliability without clear evidence of harm to nearby businesses.
      formal: Camera enforcement on downtown bus lanes improved transit reliability while showing no clear negative effect on nearby commercial activity.
      step_by_step: 1. Officials added cameras to bus lanes. 2. Bus arrivals became more reliable. 3. Business access remained stable. 4. The city recommends clearer curb markings before expansion.
  - source_id: water_valid_002
    split: valid
    title: Drought Communication Trial
    source_text: >
      A municipal water agency tested new drought communication materials in three neighborhoods.
      Instead of sending technical bulletins, the agency mailed short illustrated guides showing how much water common
      activities consume and which conservation steps produce the largest savings. Survey responses suggested that residents
      found the guides easier to understand than previous notices, and meter data showed a small but consistent drop in
      outdoor water use over six weeks. Staff concluded that the materials worked best when paired with neighborhood meetings
      where residents could ask practical questions about gardens, car washing, and appliance upgrades.
    family_targets:
      concise: Clear illustrated drought guides slightly reduced water use and worked best with local Q&A meetings.
      formal: The agency's illustrated drought guidance improved public understanding and modestly reduced outdoor water consumption, particularly when paired with neighborhood meetings.
      step_by_step: 1. The agency replaced technical bulletins with illustrated guides. 2. Residents understood the materials more easily. 3. Outdoor water use declined modestly. 4. Neighborhood meetings strengthened the effect.
  - source_id: labor_test_001
    split: test
    title: Manufacturing Shift Redesign
    source_text: >
      A small manufacturer redesigned its evening shift after workers reported fatigue and frequent handoff errors.
      Managers shortened the final production block, introduced a joint checklist for outgoing and incoming teams, and
      moved equipment cleaning to the middle of the shift rather than the end. Error reports fell during the first six weeks,
      and employees said the new structure made it easier to identify unfinished work before leaving. Supervisors caution that
      the redesign may need further adjustment during peak demand months, when overtime increases and temporary staff are more
      common on the line.
    family_targets:
      concise: The redesigned evening shift reduced handoff errors, though peak-demand periods may require more adjustments.
      formal: The evening-shift redesign reduced handoff errors and improved work visibility, although further adjustment may be required during peak-demand periods.
      step_by_step: 1. Managers redesigned the evening shift. 2. They shortened the final block and added a handoff checklist. 3. Error reports declined. 4. Peak-demand months may still require additional changes.
  - source_id: housing_test_002
    split: test
    title: Community Kitchen Pilot
    source_text: >
      A public housing complex opened a shared kitchen program for residents who lacked adequate cooking space.
      The pilot reserved evening slots for families, morning slots for older residents, and weekend sessions for cooking
      classes led by local volunteers. Participation rose steadily because the booking system was simple and staff posted
      translated instructions near the entrance. Residents reported that the kitchen helped them prepare healthier meals and
      reduced social isolation, but managers noted that storage rules remained confusing when several households used the same
      refrigerator on busy weekends.
    family_targets:
      concise: The shared kitchen pilot increased participation and meal preparation benefits, but storage rules still need improvement.
      formal: The shared kitchen pilot improved participation, meal preparation, and social connection, though storage procedures require further clarification.
      step_by_step: 1. The housing complex opened a shared kitchen. 2. Time slots were organized for different resident groups. 3. Participation increased because booking and instructions were easy to follow. 4. Storage rules remain the main unresolved issue.
