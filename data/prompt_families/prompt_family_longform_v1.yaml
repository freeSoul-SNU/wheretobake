families:
  - family_name: concise
    description: Summarize the passage briefly with only the central information.
    prompts:
      - prompt_id: concise_long_train_001
        prompt_text: Summarize the passage in one or two direct sentences.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: concise train prompt
      - prompt_id: concise_long_train_002
        prompt_text: Give only the essential summary without extra detail.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: concise train paraphrase
      - prompt_id: concise_long_train_003
        prompt_text: State the main takeaway as briefly as possible.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: concise train paraphrase
      - prompt_id: concise_long_train_004
        prompt_text: Limit the summary to the core result and nothing more.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: concise train paraphrase
      - prompt_id: concise_long_valid_001
