families:
  - family_name: concise
    description: Produce short answers with only the key point.
    prompts:
      - prompt_id: concise_001
        prompt_text: Answer briefly and only include the key point.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: high lexical overlap exemplar
      - prompt_id: concise_004
        prompt_text: Use the minimum explanation needed.
        split: test
        paraphrase_split: unseen
        qc_status: approved
        notes: low lexical overlap exemplar
      - prompt_id: concise_005
        prompt_text: Give only the essential answer.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: concise train expansion
      - prompt_id: concise_008
        prompt_text: Answer in the shortest accurate form.
        split: test
        paraphrase_split: unseen
        qc_status: approved
        notes: concise unseen expansion
  - family_name: formal
    description: Use a formal and professional tone.
    prompts:
      - prompt_id: formal_001
        prompt_text: Respond in a formal and professional tone.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: formal baseline
      - prompt_id: formal_003
        prompt_text: Answer with formal phrasing and professional diction.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: formal train expansion
      - prompt_id: formal_006
        prompt_text: Compose the response in formal language.
        split: test
        paraphrase_split: unseen
        qc_status: approved
        notes: formal unseen expansion
  - family_name: step_by_step
    description: Explain solutions as ordered steps.
    prompts:
      - prompt_id: step_001
        prompt_text: Explain the solution step by step.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: procedural exemplar
      - prompt_id: step_004
        prompt_text: Organize the explanation into numbered steps.
        split: train
        paraphrase_split: seen
        qc_status: approved
        notes: step train expansion
      - prompt_id: step_002
        prompt_text: Break the answer into clear steps.
        split: test
        paraphrase_split: unseen
        qc_status: approved
        notes: step unseen expansion
